<!DOCTYPE html>
<html>
<head>

<title>PQC Migration Platform</title>

<link rel="stylesheet" href="/static/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>

body{
background: radial-gradient(circle at top,#0f172a,#020617);
}

.login-wrapper{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
}

.login-card{
width:420px;
text-align:center;
padding:40px;
}

.login-title{
font-size:28px;
margin-bottom:10px;
}

.login-desc{
font-size:14px;
opacity:.8;
margin-bottom:25px;
line-height:1.5;
}

.enter-btn{
padding:12px 20px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.enter-btn:hover{
background:#2563eb;
box-shadow:0 0 12px rgba(59,130,246,.7);
transform:translateY(-1px);
}

</style>

</head>

<body>

<div class="navbar">

<div class="title">
Post-Quantum Migration Framework
</div>

</div>


<div class="login-wrapper">

<div class="card login-card animate__animated animate__fadeInUp">

<div class="login-title">
Secure Access
</div>

<div class="login-desc">

Quantum-resilient cryptographic analysis platform.  
Evaluate TLS configurations, detect quantum vulnerabilities,
and generate secure migration pathways.

</div>

<form method="get" action="/dashboard">

<button class="enter-btn">

Enter Security Platform

</button>

</form>

</div>

</div>

</body>
</html>
